name: UI Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start app server
        run: npm run dev > server.log 2>&1 &

      - name: Wait for app on localhost:3000
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/menu.html > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat server.log || true
          exit 1

      - name: Run UI tests
        env:
          CI: 'true'
        run: xvfb-run -a node tests/run-all-tests.js

      - name: Upload screenshots and HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts
          path: |
            Screenshots/**
            server.log
          if-no-files-found: warn